<!-- src/app/components/pet-card/pet-card.component.html -->
<div 
  class="rounded-xl overflow-hidden bg-white shadow cursor-pointer transition duration-200 hover:scale-105 hover:shadow-lg"
  (click)="onSelectPet()">
  <img [src]="pet.photo_url" [alt]="pet.name" class="w-full h-48 object-cover" />
  <div class="p-4">
    <h2 class="font-bold text-xl">{{ pet.name }}</h2>
    <p class="text-gray-500">{{ pet.type }} • {{ pet.age }} años</p>
  </div>
</div>
